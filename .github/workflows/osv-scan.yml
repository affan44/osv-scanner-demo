name: OSV-Scanner Security Check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '30 12 * * 1' # Runs every Monday at 12:30 UTC
  workflow_dispatch:      # Allows you to run it manually for your demo

permissions:
  # Required to upload results to the Security tab
  security-events: write
  # Required to read the repository content
  contents: read
  # Required for the reusable workflow to function
  actions: read

jobs:
  # This calls Google's official stable workflow directly
  scan:
    uses: "google/osv-scanner-action/.github/workflows/osv-scanner-reusable.yml@v1.9.0"
